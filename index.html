<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetric Cryptosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="glass max-w-lg w-full p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-cyan-400">LockBox v1.0</h1>
            <p class="text-slate-400 text-sm">Chiffrement Symétrique AES-128 (Fernet)</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Message ou Token</label>
                <textarea name="message" rows="4" required
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-cyan-500 outline-none transition-all"
                    placeholder="Entrez votre texte ici..."></textarea>
            </div>

            <div class="flex gap-4">
                <button type="submit" name="action" value="chiffrer" 
                    class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-cyan-900/20">
                    Chiffrer
                </button>
                <button type="submit" name="action" value="dechiffrer" 
                    class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition-colors">
                    Déchiffrer
                </button>
            </div>
        </form>

        {% if resultat %}
        <div class="mt-8 p-4 bg-slate-900/50 border-l-4 border-cyan-500 rounded">
            <h3 class="text-cyan-400 text-xs uppercase tracking-widest font-bold mb-2">{{ type_action }}</h3>
            <p class="font-mono text-sm break-all text-slate-300">{{ resultat }}</p>
        </div>
        {% endif %}
        
        <div class="mt-6 text-center">
            <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Sécurisé par l'algorithme Fernet (Python Cryptography)</p>
        </div>
    </div>

</body>
</html>
